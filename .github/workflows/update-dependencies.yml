name: Update Dependencies

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Upgrade Python dependencies
      run: uv lock --upgrade

    - name: Install updated Python dependencies
      run: uv sync --extra dev

    - name: Upgrade frontend dependencies
      working-directory: frontend
      run: npm update

    - name: Run Python Tests
      run: uv run pytest --cov=app --cov-report=term-missing

    - name: Run Biome Check
      working-directory: frontend
      run: npx biome ci .

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "chore: update dependencies"
        title: "chore: weekly dependency update"
        body: |
          Automated weekly dependency update.

          - Python: `uv lock --upgrade`
          - Frontend: `npm update`

          Tests and linting passed with the updated dependencies.
        branch: chore/update-dependencies
        delete-branch: true
        labels: dependencies
