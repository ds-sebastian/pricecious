name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release.md
          generate_release_notes: true
          files: |
            CHANGELOG.md
